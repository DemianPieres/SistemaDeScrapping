databases:
  - name: leadscraper-db
    databaseName: leadscraper
    user: leadscraper
    plan: free

services:
  # Backend FastAPI + Selenium + Chromium (Docker)
  - type: web
    name: leadscraper-backend
    runtime: docker
    plan: free
    region: oregon
    branch: main
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: leadscraper-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false  # Setear con la URL del frontend cuando esté creado
      - key: SCRAPER_HEADLESS
        value: "true"
      - key: CHROME_BINARY_PATH
        value: /usr/bin/chromium
      - key: CHROMEDRIVER_PATH
        value: /usr/bin/chromedriver
      - key: SCRAPER_REQUEST_DELAY_SECONDS
        value: "1.5"
      - key: SCRAPER_MAX_RESULTS_PER_QUERY
        value: "30"

  # Frontend React + Vite (Static Site)
  - type: web
    name: leadscraper-frontend
    runtime: static
    plan: free
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false  # Setear con <url-backend>/api cuando el backend esté listo
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
